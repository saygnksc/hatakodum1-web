<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HataKodum.com | Yapay Zeka Arıza Tespit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-bold text-blue-600">hatakodum<span class="text-gray-800">.com</span></h1>
        <p class="text-gray-500 mt-2">Yapay zeka ile saniyeler içinde arıza tespiti yapın.</p>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <div class="glass p-8 rounded-2xl shadow-xl mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">MARKA / CİHAZ</label>
                    <input type="text" id="brandInput" placeholder="Örn: Arçelik, Bosch, VW..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">HATA KODU</label>
                    <input type="text" id="codeInput" placeholder="Örn: E05, F21, P0300..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <button id="searchBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-all flex justify-center items-center">
                <span id="btnText">Arızayı Analiz Et</span>
                <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-white ml-2"></div>
            </button>
        </div>

        <div id="resultArea" class="hidden space-y-6 animate-fade-in">
            <div class="bg-white p-6 rounded-xl border-l-4 border-blue-500 shadow-sm">
                <h3 class="text-blue-600 font-bold text-lg mb-2">Sorun Özeti</h3>
                <p id="problemSummary" class="text-gray-700 leading-relaxed"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-red-50 p-6 rounded-xl border border-red-100">
                    <h3 class="text-red-600 font-bold mb-2">⚠️ Güvenlik Uyarısı</h3>
                    <p id="safetyWarning" class="text-red-700 text-sm"></p>
                </div>
                <div class="bg-green-50 p-6 rounded-xl border border-green-100">
                    <h3 class="text-green-600 font-bold mb-2">💰 Tahmini Maliyet</h3>
                    <p id="costEstimate" class="text-green-700 font-semibold"></p>
                </div>
